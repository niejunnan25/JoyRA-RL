# GemmaValue config: lightweight SigLIP2 + Gemma3 value critic.

run_id: gemma_value
run_root_dir: results/Checkpoints
seed: 42

framework:
  name: GemmaValue

  # PI0.6-style small VLM critic:
  #   SigLIP2-So400M vision tower + Gemma3-270M text backbone + value token/head.
  # Set these to local paths if the models are already cached on the server.
  gemma_value:
    vision_model: /mnt/workspace/users/niejunnan/assets/huggingface_assets/models/google/siglip2-so400m-patch14-224
    text_model: /mnt/workspace/users/niejunnan/assets/huggingface_assets/models/google/gemma-3-270m
    tokenizer: /mnt/workspace/users/niejunnan/assets/huggingface_assets/models/google/gemma-3-270m
    precision: bf16
    max_text_length: 200
    text_template: "Task: {text}."
    max_images: 3

    # RLinf-style default: Gemma3 encodes image/language prefix, then a small
    # Gemma Transformer expert reads the prefix KV cache for value prediction.
    readout_type: expert
    critic_expert_variant: gemma_1m
    stop_gradient_to_vlm: false

    # These can be flipped for quick ablations or low-memory smoke tests.
    freeze_vision_encoder: false
    freeze_text_model: false
    freeze_image_projection: false
    use_gradient_checkpointing: false

    image_projection_bias: true
    value_head_hidden_dim: 0
    value_dropout: 0.0
    target_loss: soft
    bin_min: -1.0
    bin_max: 0.0
    trust_remote_code: false

  value_num_bins: 51

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /mnt/workspace/datasets/
    data_mix: sq_agi_beta
    action_type: delta_ee
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    image_size: [224, 224]
    delete_pause_frame: false
    include_state: false

# Training hyperparameters and return/bin settings are still controlled by
# starVLA/training/train_value.py command-line arguments and run scripts.
